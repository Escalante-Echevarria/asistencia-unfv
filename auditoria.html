<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditoría - Asistencia UNFV FIEI</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-container">
    <!-- Navbar y Sidebar -->

    <div class="main-content" style="margin-left: 280px;">
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">
                    <i class="fas fa-clipboard-list-check"></i>
                    Auditoría del Sistema
                </h2>
                <div>
                    <input type="text" id="buscarAuditoria" placeholder="Buscar en auditoría..." class="form-control">
                    <button class="btn btn-danger" onclick="limpiarAuditoria()">
                        <i class="fas fa-trash"></i> Limpiar Logs (Super Admin)
                    </button>
                </div>
            </div>

            <!-- Modal Super Admin -->
            <div id="modalSuperAdmin" class="modal" style="display: none;">
                <div class="modal-content">
                    <h3>Autenticación Super Admin</h3>
                    <input type="password" id="claveSuperAdmin" placeholder="Clave Super Admin">
                    <div class="modal-buttons">
                        <button class="btn btn-primary" onclick="verificarSuperAdmin()">Verificar</button>
                        <button class="btn btn-outline" onclick="cerrarModal()">Cancelar</button>
                    </div>
                </div>
            </div>

            <div class="table-container">
                <table id="auditoriaTable">
                    <thead>
                        <tr>
                            <th>Fecha/Hora</th>
                            <th>Usuario</th>
                            <th>Acción</th>
                            <th>Tabla</th>
                            <th>Registro ID</th>
                            <th>Detalles</th>
                            <th>FUT/Documento</th>
                            <th>Docente Solicitante</th>
                            <th>Ver</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/auditoria.js"></script>
</body>
</html>
