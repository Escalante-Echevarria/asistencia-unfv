<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia UNFV - FIEI | Login</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="unfv-logo">
                    <i class="fas fa-university"></i>
                    <h1>Universidad Nacional<br>Federico Villarreal</h1>
                    <h2>Facultad de Ingeniería Electrónica e Informática</h2>
                </div>
            </div>
            
            <form id="loginForm" class="login-form">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="usuario" placeholder="Usuario" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Contraseña" required>
                </div>
                <button type="submit" class="login-btn">
                    <span>Acceder al Sistema</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>
            
            <div id="mensajeError" class="alert-error" style="display: none;"></div>
        </div>
        
        <div class="login-footer">
            <p>Sistema de Control de Asistencia • FIEI • 2024</p>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
